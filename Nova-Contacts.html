<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Rocketry - Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 15px 30px;
    }
    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }
    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Contact Section */
    .contacts {
      max-width: 1000px;
      margin: 50px auto;
      text-align: center;
    }
    .contacts h1 {
      color: rgb(168, 12, 12);
      font-size: 36px;
      margin-bottom: 20px;
    }
    .contacts p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }
    .contacts-card {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: white;
      border: 2px solid rgb(168, 12, 12);
      border-radius: 8px;
      transition: 0.3s ease;
    }
    .contacts-card:hover {
      background-color: #f9f9f9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Nova Rocketry</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="Nova-Projects.html">Projects</a>
      <a href="Nova-Contacts.html">Contact</a>
    </div>
  </div>

  <!-- Contact Section -->
  <div class="contacts">
    <h1>Contact Us</h1>
    <p>Get in touch with Nova Rocketry.</p>

    <div class="contacts-card">
      <h2>Primary Contact</h2>
      <p>Name: Khaldoon El Haj</p>
      <p>Email: doonzelhaj@gmail.com</p>
      <p>Phone: +961 81 880 328</p>
      <p>Location: Chouefait, Lebanon</p>
    </div>

    <div class="contacts-card">
      <h2>Associates</h2>
      <p>~ No Current Associates ~</p>
    </div>
  </div>
</body>
</html>
