<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Rocketry - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Oxygen, sans-serif;
      background-color: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 15px 30px;
    }
    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }
    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .navbar .links a:hover {
      text-decoration: underline;
    } 

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #a00, #600);
      color: white;
    }
    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }
    .hero .buttons a button {
      background-color: white;
      color: rgb(168, 12, 12);
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin: 10px;
    }
    .hero .buttons a button:hover {
      background-color: #ddd;
    }

    /* Project Showcase */
    .projects {
      max-width: 1000px;
      margin: 50px auto;
      text-align: center;
    }
    .projects h2 {
      color: rgb(168, 12, 12);
      margin-bottom: 20px;
    }
    .project-card {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: white;
      border: 2px solid rgb(168, 12, 12);
      border-radius: 8px;
    }

  .main-title {
    font-size: 72px; /* extra large */
    font-weight: bold;
    color: rgb(255, 255, 255);
  }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Nova Rocketry</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="Nova-Projects.html">Projects</a>
      <a href="Nova-Contacts.html">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1 class="main-title">Nova Rocketry</h1>
    <p>Beginning Model Rocketry </p>
    <div class="buttons">
      <a href="Nova-Projects.html"><button>See Projects</button></a>
      <a href="Nova-Contacts.html"><button>Join Us</button></a>
    </div>
  </div>

</body>
</html>
